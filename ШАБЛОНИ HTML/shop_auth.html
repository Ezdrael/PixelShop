<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід | Адмін-панель</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-container {
            max-width: 400px;
            width: 100%;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            background-color: #fff;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .google-btn {
            background-color: #4285F4; /* Google Blue */
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .google-btn:hover {
            background-color: #357ae8; /* Darker Google Blue */
        }
        .google-btn .fab {
            font-size: 1.3rem;
            margin-right: 10px;
        }
        .separator {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }
        .separator::before,
        .separator::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background-color: #dee2e6;
        }
        .separator::before {
            left: 0;
        }
        .separator::after {
            right: 0;
        }
        .separator span {
            background-color: #fff;
            padding: 0 10px;
            color: #6c757d;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google Logo" style="width: 120px; margin-bottom: 15px;">
            <h3>Вхід до адмін-панелі</h3>
        </div>

        <p class="text-center text-muted mb-4">Увійдіть за допомогою свого облікового запису Google</p>

        <button class="google-btn" id="googleSignInBtn">
            <i class="fab fa-google"></i> Увійти з Google
        </button>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Проста імітація для кнопки Google
        document.getElementById('googleSignInBtn').addEventListener('click', function() {
            alert('Ви натиснули кнопку "Увійти з Google"! Для реального входу потрібна інтеграція Google Sign-In API.');
            // В реальному проекті тут буде виклик Google Sign-In API
            // або перенаправлення на сторінку OAuth
        });
    </script>

</body>
</html>
